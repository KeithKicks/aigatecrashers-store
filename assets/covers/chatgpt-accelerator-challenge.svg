<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1500" role="img" aria-label="The ChatGPT Accelerator Challenge — AI Gatecrashers">
  <title>The ChatGPT Accelerator Challenge</title>
  <desc>AI Gatecrashers product cover — The ChatGPT Accelerator Challenge, $27</desc>
  <defs>
    <linearGradient id="bg-chatgpt-accelerator-challenge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1c3f"/>
      <stop offset="100%" stop-color="#050c1f"/>
    </linearGradient>
    <linearGradient id="medallion-chatgpt-accelerator-challenge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4cc9f0"/>
      <stop offset="100%" stop-color="#0fa4d9"/>
    </linearGradient>
    <radialGradient id="glow-chatgpt-accelerator-challenge" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#0fa4d9" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#0fa4d9" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="1500" fill="url(#bg-chatgpt-accelerator-challenge)"/>
  <rect width="1200" height="1500" fill="url(#glow-chatgpt-accelerator-challenge)"/>

  <!-- Top accent stripe -->
  <rect x="0" y="0" width="1200" height="10" fill="url(#medallion-chatgpt-accelerator-challenge)"/>

  <!-- Brand wordmark -->
  <text x="60" y="78" font-family="'Inter', system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="28" font-weight="900"
        letter-spacing="6" fill="#4cc9f0">AI GATECRASHERS</text>

  <g>
    <rect x="960" y="52" width="180" height="48" rx="24" fill="#16a34a"/>
    <text x="1050" y="84" font-family="'Inter', system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="20" font-weight="800"
          letter-spacing="3" text-anchor="middle" fill="#ffffff">BEST SELLER</text>
  </g>

  <!-- Emoji medallion -->
  <circle cx="600" cy="520" r="200" fill="#ffffff" stroke="#0fa4d9" stroke-width="6"/>
  <circle cx="600" cy="520" r="180" fill="none" stroke="#4cc9f0" stroke-width="2" opacity="0.45"/>
  <text x="600" y="610" font-size="220" text-anchor="middle"
        style="font-family:'Apple Color Emoji','Segoe UI Emoji','Noto Color Emoji',sans-serif;">🏆</text>

  <!-- Kicker (small uppercase above title) -->
  <text x="600" y="830" font-family="'Inter', system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="26" font-weight="800"
        letter-spacing="6" text-anchor="middle" fill="#0fa4d9">AI TOOLKIT</text>

  <!-- Title (1-3 lines) -->
  <text x="600" y="882" font-family="'Inter', system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="70" font-weight="900" letter-spacing="-1.5" text-anchor="middle" fill="#ffffff">The ChatGPT</text>
  <text x="600" y="970" font-family="'Inter', system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="70" font-weight="900" letter-spacing="-1.5" text-anchor="middle" fill="#ffffff">Accelerator</text>
  <text x="600" y="1058" font-family="'Inter', system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="70" font-weight="900" letter-spacing="-1.5" text-anchor="middle" fill="#ffffff">Challenge</text>

  <!-- Subtitle line / price -->
  <g>
    <rect x="550" y="1240"
          width="100"
          height="96" rx="48" fill="#0fa4d9"/>
    <text x="600" y="1306" font-family="'Inter', system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="56" font-weight="900"
          text-anchor="middle" fill="#ffffff">$27</text>
  </g>

  <!-- Byline -->
  <text x="600" y="1420" font-family="'Inter', system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="22" font-weight="500"
        text-anchor="middle" fill="#c9d1e3">By Keith Allen Schuh · aigatecrashers.com</text>
</svg>
